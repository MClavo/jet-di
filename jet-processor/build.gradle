plugins {
    id 'java-library'
}

dependencies {
    implementation project(':jet-core')
    testImplementation 'org.junit.jupiter:junit-jupiter:5.14.4'
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}